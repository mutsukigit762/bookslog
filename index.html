<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>読書記録</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap');

- { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

button {
-webkit-appearance: none;
appearance: none;
cursor: pointer;
color: inherit;
background: none;
border: none;
font-family: inherit;
}

input, textarea { -webkit-appearance: none; appearance: none; }

body {
font-family: ‘Noto Serif JP’, serif;
background: #f5f2ee;
color: #2a2520;
min-height: 100vh;
padding-bottom: 100px;
}

header {
background: #fdfbf8;
border-bottom: 1px solid #ddd8d0;
padding: 20px 20px 16px;
position: sticky;
top: 0;
z-index: 10;
}

header h1 { font-size: 18px; font-weight: 600; letter-spacing: 0.08em; color: #2a2520; }

.header-sub {
font-family: ‘DM Mono’, monospace;
font-size: 11px;
color: #9e9890;
margin-top: 2px;
letter-spacing: 0.05em;
}

.header-actions { display: flex; gap: 8px; margin-top: 12px; }

.btn-small {
font-family: ‘DM Mono’, monospace;
font-size: 11px;
letter-spacing: 0.04em;
padding: 6px 12px;
border: 1px solid #ddd8d0;
border-radius: 4px;
background: #f5f2ee;
color: #9e9890;
transition: background 0.15s;
}

.btn-small:active { background: #ddd8d0; }

.filter-bar {
padding: 12px 20px;
display: flex;
gap: 8px;
overflow-x: auto;
scrollbar-width: none;
background: #fdfbf8;
border-bottom: 1px solid #ddd8d0;
}

.filter-bar::-webkit-scrollbar { display: none; }

.filter-chip {
font-family: ‘DM Mono’, monospace;
font-size: 11px;
white-space: nowrap;
padding: 5px 12px;
border-radius: 20px;
border: 1px solid #ddd8d0;
background: transparent;
color: #9e9890;
transition: all 0.15s;
}

.filter-chip.active {
background: #2a2520;
color: #fdfbf8;
border-color: #2a2520;
}

.book-list {
padding: 16px 20px;
display: flex;
flex-direction: column;
gap: 8px;
}

.empty-state {
text-align: center;
padding: 60px 20px;
color: #9e9890;
font-size: 14px;
line-height: 2;
}

.empty-state .big { font-size: 32px; display: block; margin-bottom: 8px; }

.book-card {
background: #fdfbf8;
border: 1px solid #ddd8d0;
border-radius: 8px;
padding: 16px;
cursor: pointer;
transition: background 0.15s;
animation: fadeIn 0.2s ease;
}

@keyframes fadeIn {
from { opacity: 0; transform: translateY(4px); }
to { opacity: 1; transform: translateY(0); }
}

.book-card:active { background: #f5f2ee; }

.book-card-top {
display: flex;
justify-content: space-between;
align-items: flex-start;
gap: 12px;
}

.book-title { font-size: 15px; font-weight: 600; line-height: 1.5; flex: 1; color: #2a2520; }

.book-tags { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }

.tag {
font-family: ‘DM Mono’, monospace;
font-size: 10px;
padding: 2px 8px;
border-radius: 3px;
text-align: center;
letter-spacing: 0.03em;
}

.tag-done { background: #2a2520; color: #fff; }
.tag-reading { background: #ddd8d0; color: #9e9890; }
.tag-buy { background: #5c4a3a; color: #fff; }
.tag-borrow { background: #7a8c7a; color: #fff; }

.book-author { font-size: 12px; color: #9e9890; margin-top: 4px; }

.book-date {
font-family: ‘DM Mono’, monospace;
font-size: 11px;
color: #9e9890;
margin-top: 10px;
}

.book-review-preview {
font-size: 12px;
color: #9e9890;
margin-top: 8px;
line-height: 1.6;
display: -webkit-box;
-webkit-line-clamp: 2;
-webkit-box-orient: vertical;
overflow: hidden;
}

.fab {
position: fixed;
bottom: 24px;
right: 24px;
width: 56px;
height: 56px;
border-radius: 50%;
background: #2a2520;
color: #fdfbf8;
font-size: 24px;
display: flex;
align-items: center;
justify-content: center;
box-shadow: 0 4px 16px rgba(0,0,0,0.2);
transition: transform 0.15s;
z-index: 10;
}

.fab:active { transform: scale(0.92); }

.modal-overlay {
display: none;
position: fixed;
top: 0; left: 0; right: 0; bottom: 0;
background: rgba(0,0,0,0.4);
z-index: 9999;
align-items: flex-end;
}

.modal-overlay.open { display: flex; }

.modal {
background: #fdfbf8;
border-radius: 16px 16px 0 0;
width: 100%;
max-height: 90dvh;
max-height: 90vh;
overflow-y: auto;
-webkit-overflow-scrolling: touch;
padding: 0 0 48px;
animation: slideUp 0.25s ease;
position: relative;
z-index: 10000;
}

@keyframes slideUp {
from { transform: translateY(40px); opacity: 0; }
to { transform: translateY(0); opacity: 1; }
}

.modal-handle {
width: 36px; height: 4px;
background: #ddd8d0;
border-radius: 2px;
margin: 12px auto 0;
}

.modal-header {
padding: 20px 20px 0;
display: flex;
justify-content: space-between;
align-items: center;
}

.modal-title { font-size: 16px; font-weight: 600; letter-spacing: 0.05em; color: #2a2520; }

.modal-close {
width: 32px; height: 32px;
background: #f5f2ee;
border-radius: 50%;
font-size: 18px;
display: flex;
align-items: center;
justify-content: center;
color: #9e9890;
}

.modal-body {
padding: 20px;
display: flex;
flex-direction: column;
gap: 16px;
}

.field-label {
font-family: ‘DM Mono’, monospace;
font-size: 11px;
letter-spacing: 0.06em;
color: #9e9890;
margin-bottom: 6px;
display: block;
}

.required-mark { color: #c0392b; margin-left: 3px; }

input[type=“text”],
input[type=“date”],
textarea {
width: 100%;
font-family: ‘Noto Serif JP’, serif;
font-size: 14px;
color: #2a2520;
background: #f5f2ee;
border: 1px solid #ddd8d0;
border-radius: 6px;
padding: 10px 12px;
outline: none;
transition: border-color 0.15s;
}

input[type=“text”]:focus,
input[type=“date”]:focus,
textarea:focus { border-color: #2a2520; }

textarea { resize: none; min-height: 100px; line-height: 1.7; }

.toggle-group {
display: flex;
border: 1px solid #ddd8d0;
border-radius: 6px;
overflow: hidden;
}

.toggle-btn {
flex: 1;
padding: 9px 0;
font-family: ‘Noto Serif JP’, serif;
font-size: 13px;
color: #9e9890;
background: transparent;
transition: all 0.15s;
text-align: center;
}

.toggle-btn:not(:last-child) { border-right: 1px solid #ddd8d0; }
.toggle-btn.active { background: #2a2520; color: #fdfbf8; }

.btn-primary {
width: 100%;
padding: 14px;
background: #2a2520;
color: #fdfbf8;
font-family: ‘Noto Serif JP’, serif;
font-size: 15px;
font-weight: 600;
letter-spacing: 0.06em;
border-radius: 8px;
transition: opacity 0.15s;
}

.btn-primary:active { opacity: 0.8; }

.btn-danger {
width: 100%;
padding: 12px;
background: transparent;
color: #c0392b;
border: 1px solid #c0392b;
border-radius: 8px;
font-family: ‘Noto Serif JP’, serif;
font-size: 14px;
transition: all 0.15s;
}

.btn-danger:active { background: #c0392b; color: #fff; }

.detail-field { border-bottom: 1px solid #ddd8d0; padding-bottom: 16px; }
.detail-field:last-of-type { border-bottom: none; }
.detail-value { font-size: 14px; line-height: 1.8; white-space: pre-wrap; margin-top: 4px; color: #2a2520; }
.detail-tags { display: flex; gap: 6px; flex-wrap: wrap; }
</style>

</head>
<body>

<header>
  <h1>読書記録</h1>
  <div class="header-sub" id="totalCount">0 books</div>
  <div class="header-actions">
    <button class="btn-small" onclick="exportJSON()">↓ エクスポート</button>
    <button class="btn-small" onclick="document.getElementById('importFile').click()">↑ インポート</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
  </div>
</header>

<div class="filter-bar">
  <button class="filter-chip active" onclick="setFilter('all',this)">すべて</button>
  <button class="filter-chip" onclick="setFilter('done',this)">読了</button>
  <button class="filter-chip" onclick="setFilter('reading',this)">未読了</button>
  <button class="filter-chip" onclick="setFilter('buy',this)">購入</button>
  <button class="filter-chip" onclick="setFilter('borrow',this)">借りた</button>
</div>

<div class="book-list" id="bookList"></div>

<button class="fab" onclick="openAddModal()">＋</button>

<div class="modal-overlay" id="editModal" onclick="handleOverlayClick(event,'editModal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title" id="editModalTitle">新しい本</span>
      <button class="modal-close" onclick="closeEditModal()">×</button>
    </div>
    <div class="modal-body">
      <div>
        <label class="field-label">タイトル <span class="required-mark">*</span></label>
        <input type="text" id="inputTitle" placeholder="本のタイトル">
      </div>
      <div>
        <label class="field-label">著者</label>
        <input type="text" id="inputAuthor" placeholder="著者名">
      </div>
      <div>
        <label class="field-label">読んだ日付</label>
        <input type="date" id="inputDate">
      </div>
      <div>
        <label class="field-label">読了状況</label>
        <div class="toggle-group">
          <button class="toggle-btn active" id="btnDone" onclick="setStatus('done')">読了</button>
          <button class="toggle-btn" id="btnReading" onclick="setStatus('reading')">未読了</button>
        </div>
      </div>
      <div>
        <label class="field-label">入手方法</label>
        <div class="toggle-group">
          <button class="toggle-btn active" id="btnBuy" onclick="setSource('buy')">購入</button>
          <button class="toggle-btn" id="btnBorrow" onclick="setSource('borrow')">借りた</button>
        </div>
      </div>
      <div>
        <label class="field-label">感想・レビュー</label>
        <textarea id="inputReview" placeholder="読んで感じたこと、メモなど…"></textarea>
      </div>
      <button class="btn-primary" onclick="saveBook()">保存する</button>
      <button class="btn-danger" id="deleteBtn" style="display:none" onclick="deleteBook()">この記録を削除する</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="detailModal" onclick="handleOverlayClick(event,'detailModal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title">詳細</span>
      <button class="modal-close" onclick="closeDetailModal()">×</button>
    </div>
    <div class="modal-body" id="detailBody"></div>
  </div>
</div>

<script>
  let books = JSON.parse(localStorage.getItem('books_log') || '[]');
  let currentFilter = 'all';
  let editingId = null;
  let currentStatus = 'done';
  let currentSource = 'buy';

  function save() { localStorage.setItem('books_log', JSON.stringify(books)); }

  function handleOverlayClick(e, modalId) {
    if (e.target === document.getElementById(modalId)) {
      if (modalId === 'editModal') closeEditModal();
      else closeDetailModal();
    }
  }

  function openModal(id) {
    const el = document.getElementById(id);
    el.style.display = 'flex';
    requestAnimationFrame(() => el.classList.add('open'));
    document.body.style.overflow = 'hidden';
  }

  function closeModal(id) {
    const el = document.getElementById(id);
    el.classList.remove('open');
    el.style.display = 'none';
    document.body.style.overflow = '';
  }

  function getFiltered() {
    if (currentFilter === 'all') return books;
    if (currentFilter === 'done') return books.filter(b => b.status === 'done');
    if (currentFilter === 'reading') return books.filter(b => b.status === 'reading');
    if (currentFilter === 'buy') return books.filter(b => b.source === 'buy');
    if (currentFilter === 'borrow') return books.filter(b => b.source === 'borrow');
    return books;
  }

  function render() {
    const list = document.getElementById('bookList');
    const filtered = getFiltered();
    document.getElementById('totalCount').textContent = books.length + ' books';

    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty-state">
        <span class="big">📖</span>
        ${books.length === 0 ? '＋ボタンで最初の一冊を記録しよう' : 'この条件の本はまだない'}
      </div>`;
      return;
    }

    const sorted = [...filtered].sort((a, b) => {
      if (!a.date && !b.date) return 0;
      if (!a.date) return 1;
      if (!b.date) return -1;
      return b.date.localeCompare(a.date);
    });

    list.innerHTML = sorted.map(b => `
      <div class="book-card" onclick="openDetail('${b.id}')">
        <div class="book-card-top">
          <div style="flex:1">
            <div class="book-title">${esc(b.title)}</div>
            ${b.author ? `<div class="book-author">${esc(b.author)}</div>` : ''}
          </div>
          <div class="book-tags">
            <span class="tag ${b.status==='done'?'tag-done':'tag-reading'}">${b.status==='done'?'読了':'未読了'}</span>
            <span class="tag ${b.source==='buy'?'tag-buy':'tag-borrow'}">${b.source==='buy'?'購入':'借りた'}</span>
          </div>
        </div>
        ${b.date ? `<div class="book-date">${b.date}</div>` : ''}
        ${b.review ? `<div class="book-review-preview">${esc(b.review)}</div>` : ''}
      </div>
    `).join('');
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function setFilter(filter, el) {
    currentFilter = filter;
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    render();
  }

  function openAddModal() {
    editingId = null;
    currentStatus = 'done';
    currentSource = 'buy';
    document.getElementById('editModalTitle').textContent = '新しい本';
    document.getElementById('inputTitle').value = '';
    document.getElementById('inputAuthor').value = '';
    document.getElementById('inputDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('inputReview').value = '';
    document.getElementById('deleteBtn').style.display = 'none';
    updateStatusUI();
    updateSourceUI();
    openModal('editModal');
  }

  function openEditModal(id) {
    const b = books.find(x => x.id === id);
    if (!b) return;
    editingId = id;
    currentStatus = b.status || 'done';
    currentSource = b.source || 'buy';
    document.getElementById('editModalTitle').textContent = '編集';
    document.getElementById('inputTitle').value = b.title;
    document.getElementById('inputAuthor').value = b.author || '';
    document.getElementById('inputDate').value = b.date || '';
    document.getElementById('inputReview').value = b.review || '';
    document.getElementById('deleteBtn').style.display = 'block';
    updateStatusUI();
    updateSourceUI();
    closeDetailModal();
    openModal('editModal');
  }

  function closeEditModal() { closeModal('editModal'); }

  function setStatus(s) { currentStatus = s; updateStatusUI(); }
  function setSource(s) { currentSource = s; updateSourceUI(); }

  function updateStatusUI() {
    document.getElementById('btnDone').classList.toggle('active', currentStatus === 'done');
    document.getElementById('btnReading').classList.toggle('active', currentStatus === 'reading');
  }

  function updateSourceUI() {
    document.getElementById('btnBuy').classList.toggle('active', currentSource === 'buy');
    document.getElementById('btnBorrow').classList.toggle('active', currentSource === 'borrow');
  }

  function saveBook() {
    const title = document.getElementById('inputTitle').value.trim();
    if (!title) {
      const el = document.getElementById('inputTitle');
      el.focus();
      el.style.borderColor = '#c0392b';
      setTimeout(() => el.style.borderColor = '', 1500);
      return;
    }
    const book = {
      id: editingId || Date.now().toString(),
      title,
      author: document.getElementById('inputAuthor').value.trim(),
      date: document.getElementById('inputDate').value,
      status: currentStatus,
      source: currentSource,
      review: document.getElementById('inputReview').value.trim(),
      updatedAt: new Date().toISOString()
    };
    if (editingId) {
      const idx = books.findIndex(b => b.id === editingId);
      if (idx !== -1) books[idx] = book;
    } else {
      books.unshift(book);
    }
    save();
    render();
    closeEditModal();
  }

  function deleteBook() {
    if (!editingId) return;
    if (!confirm('この記録を削除する？')) return;
    books = books.filter(b => b.id !== editingId);
    save();
    render();
    closeEditModal();
  }

  function openDetail(id) {
    const b = books.find(x => x.id === id);
    if (!b) return;
    document.getElementById('detailBody').innerHTML = `
      <div>
        <h2 style="font-size:18px;font-weight:600;line-height:1.6;color:#2a2520">${esc(b.title)}</h2>
        ${b.author ? `<p style="font-size:13px;color:#9e9890;margin-top:4px">${esc(b.author)}</p>` : ''}
      </div>
      <div class="detail-tags">
        <span class="tag ${b.status==='done'?'tag-done':'tag-reading'}">${b.status==='done'?'読了':'未読了'}</span>
        <span class="tag ${b.source==='buy'?'tag-buy':'tag-borrow'}">${b.source==='buy'?'購入':'借りた'}</span>
      </div>
      ${b.date ? `<div class="detail-field">
        <span class="field-label">読んだ日付</span>
        <div class="detail-value">${b.date}</div>
      </div>` : ''}
      ${b.review ? `<div class="detail-field">
        <span class="field-label">感想・レビュー</span>
        <div class="detail-value">${esc(b.review)}</div>
      </div>` : ''}
      <button class="btn-small" style="width:100%;padding:10px;text-align:center;color:#2a2520" onclick="openEditModal('${b.id}')">編集する</button>
    `;
    openModal('detailModal');
  }

  function closeDetailModal() { closeModal('detailModal'); }

  function exportJSON() {
    if (books.length === 0) { alert('記録がまだない'); return; }
    const blob = new Blob([JSON.stringify(books, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'books_' + new Date().toISOString().split('T')[0] + '.json';
    a.click();
    URL.revokeObjectURL(url);
  }

  function importJSON(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!Array.isArray(data)) throw new Error();
        if (!confirm(data.length + '件のデータをインポートする？')) return;
        const existingIds = new Set(books.map(b => b.id));
        const newBooks = data.filter(b => !existingIds.has(b.id));
        books = [...books, ...newBooks];
        save();
        render();
        alert(newBooks.length + '件追加した');
      } catch {
        alert('読み込みに失敗した。正しいJSONファイルか確認して');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  }

  render();
</script>

</body>
</html>
