<!DOCTYPE html>

<html lang="ja" style="overscroll-behavior:none;overflow-x:hidden;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="読書記録">
<link rel="apple-touch-icon" href="icon.png">
<title>読書記録</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap');

/* 修正① */
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

button {
-webkit-appearance: none;
appearance: none;
cursor: pointer;
color: inherit;
background: none;
border: none;
font-family: inherit;
}

input, textarea { -webkit-appearance: none; appearance: none; }

body {
font-family: 'Noto Serif JP', serif; /* 修正② */
background: #f5f2ee;
color: #2a2520;
min-height: 100vh;
padding-bottom: 100px;
overscroll-behavior: none;
overflow-x: hidden;
}

header {
background: #fdfbf8;
border-bottom: 1px solid #ddd8d0;
padding: 20px 20px 16px;
position: sticky;
top: 0;
z-index: 10;
}

header h1 { font-size: 18px; font-weight: 600; letter-spacing: 0.08em; color: #2a2520; }

.header-sub {
font-family: 'DM Mono', monospace;
font-size: 11px;
color: #9e9890;
margin-top: 2px;
letter-spacing: 0.05em;
}

.header-actions { display: flex; gap: 8px; margin-top: 12px; }

.btn-small {
font-family: 'DM Mono', monospace;
font-size: 11px;
letter-spacing: 0.04em;
padding: 6px 12px;
border: 1px solid #ddd8d0;
border-radius: 4px;
background: #f5f2ee;
color: #9e9890;
transition: background 0.15s;
}

.btn-small:active { background: #ddd8d0; }

.filter-bar {
padding: 12px 20px;
display: flex;
gap: 8px;
overflow-x: auto;
scrollbar-width: none;
background: #fdfbf8;
border-bottom: 1px solid #ddd8d0;
}

.filter-bar::-webkit-scrollbar { display: none; }

.filter-chip {
font-family: 'DM Mono', monospace;
font-size: 11px;
white-space: nowrap;
padding: 5px 12px;
border-radius: 20px;
border: 1px solid #ddd8d0;
background: transparent;
color: #9e9890;
transition: all 0.15s;
}

.filter-chip.active {
background: #2a2520;
color: #fdfbf8;
border-color: #2a2520;
}

.book-list {
padding: 16px 20px;
display: flex;
flex-direction: column;
gap: 8px;
}

.empty-state {
text-align: center;
padding: 60px 20px;
color: #9e9890;
font-size: 14px;
line-height: 2;
}

.empty-state .big { font-size: 32px; display: block; margin-bottom: 8px; }

.book-card {
background: #fdfbf8;
border: 1px solid #ddd8d0;
border-radius: 8px;
padding: 16px;
cursor: pointer;
transition: background 0.15s;
animation: fadeIn 0.2s ease;
}

@keyframes fadeIn {
from { opacity: 0; transform: translateY(4px); }
to { opacity: 1; transform: translateY(0); }
}

.book-card:active { background: #f5f2ee; }

.book-card-top {
display: flex;
justify-content: space-between;
align-items: flex-start;
gap: 12px;
}

.book-title { font-size: 15px; font-weight: 600; line-height: 1.5; flex: 1; color: #2a2520; }

.book-tags { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }

.tag {
font-family: 'DM Mono', monospace;
font-size: 10px;
padding: 2px 8px;
border-radius: 3px;
text-align: center;
letter-spacing: 0.03em;
}

.tag-done { background: #2a2520; color: #fff; }
.tag-reading { background: #ddd8d0; color: #9e9890; }
.tag-buy { background: #5c4a3a; color: #fff; }
.tag-borrow { background: #7a8c7a; color: #fff; }

.book-author { font-size: 12px; color: #9e9890; margin-top: 4px; }

.book-date {
font-family: 'DM Mono', monospace;
font-size: 11px;
color: #9e9890;
margin-top: 10px;
}

.book-review-preview {
font-size: 12px;
color: #9e9890;
margin-top: 8px;
line-height: 1.6;
display: -webkit-box;
-webkit-line-clamp: 2;
-webkit-box-orient: vertical;
overflow: hidden;
}

.fab {
position: fixed;
bottom: 24px;
right: 24px;
width: 56px;
height: 56px;
border-radius: 50%;
background: #2a2520;
color: #fdfbf8;
font-size: 24px;
display: flex;
align-items: center;
justify-content: center;
box-shadow: 0 4px 16px rgba(0,0,0,0.2);
transition: transform 0.15s;
z-index: 10;
}

.fab:active { transform: scale(0.92); }

.modal-overlay {
display: none;
position: fixed;
top: 0; left: 0; right: 0; bottom: 0;
width: 100%;
height: 100%;
background: rgba(0,0,0,0.4);
z-index: 9999;
align-items: flex-end;
}

.modal-overlay.open { display: flex; }

.modal {
background: #fdfbf8;
border-radius: 16px 16px 0 0;
width: 100%;
max-width: 100vw;
max-height: 82dvh;
overflow-x: hidden;
overflow-y: scroll;
-webkit-overflow-scrolling: touch;
overscroll-behavior-x: none;
overscroll-behavior-y: contain;
padding: 0 0 48px;
animation: slideUp 0.25s ease;
position: relative;
z-index: 10000;
}

.modal-handle {
width: 36px; height: 4px;
background: #ddd8d0;
border-radius: 2px;
margin: 12px auto 0;
}

.modal-header {
padding: 20px 20px 0;
display: flex;
justify-content: space-between;
align-items: center;
}

.modal-title { font-size: 16px; font-weight: 600; letter-spacing: 0.05em; color: #2a2520; }

.modal-close {
width: 32px; height: 32px;
background: #f5f2ee;
border-radius: 50%;
font-size: 18px;
display: flex;
align-items: center;
justify-content: center;
color: #9e9890;
}

.modal-body {
padding: 20px;
display: flex;
flex-direction: column;
gap: 16px;
width: 100%;
box-sizing: border-box;
}

.field-label {
font-family: 'DM Mono', monospace;
font-size: 11px;
letter-spacing: 0.06em;
color: #9e9890;
margin-bottom: 6px;
display: block;
}

.required-mark { color: #c0392b; margin-left: 3px; }

.modal-body > div { width: 100%; }

/* 修正② + 修正③ */
input[type="text"],
input[type="date"],
textarea {
width: 100%;
max-width: 100%;
font-family: 'Noto Serif JP', serif;
font-size: 14px;
color: #2a2520;
background: #f5f2ee;
border: 1px solid #ddd8d0;
border-radius: 6px;
padding: 10px 12px;
outline: none;
transition: border-color 0.15s;
display: block;
box-sizing: border-box;
}

input[type="text"]:focus,
input[type="date"]:focus,
textarea:focus { border-color: #2a2520; }

textarea { resize: none; min-height: 100px; line-height: 1.7; }

/* 以下JSは変更なし except モーダルcloseだけ */
</style>
</head>

<body>
<!-- 中身そのままなので省略せず全部入れて使ってOK -->

<script>
function closeModal(id) {
  const el = document.getElementById(id);
  el.classList.remove('open');
  setTimeout(() => el.style.display = 'none', 200);
  document.body.style.overflow = '';
}
</script>

</body>
</html>
